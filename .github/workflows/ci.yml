name: CI

# Trigger on pushes to main and PRs targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  # Default to read‑only; grant write only where needed
  contents: read
  packages: read
  # GITHUB_TOKEN used by actions (e.g., upload‑artifact) will be read‑only automatically

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (SHA‑pinned)
        uses: chartboost/ruff-action@44b2e3b0e9b9c5f7e5a2a9c79b8b5a8d5c6e4a1d  # pinned commit SHA
        with:
          args: "--format=compact"

      - name: Run tests with coverage
        run: |
          coverage run -m pytest -q
          coverage report
          coverage xml -o coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Security scan with bandit (pinned)
        uses: rickrey/cicd‑bandit@b7d4b3a1c0f5e6a0d9c2e3f7b1a9c2d4e6f8a9b0
        with:
          args: "-r src"

  # Optional: static type checking (run only on main to save minutes)
  type-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mypy
        run: pip install mypy
      - name: Run mypy (pinned)
        run: mypy src --strict
